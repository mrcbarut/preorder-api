<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ön Sipariş Admin Paneli</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
    .header {
      background: #111;
      color: white;
      padding: 20px 30px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 22px; }
    .stats {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      flex: 1;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stat-card .number {
      font-size: 36px;
      font-weight: bold;
      color: #111;
    }
    .stat-card .label {
      font-size: 13px;
      color: #666;
      margin-top: 5px;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-dark { background: #111; color: white; }
    .btn-green { background: #27ae60; color: white; }
    .btn:hover { opacity: 0.85; }
    .table-wrapper {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #111;
      color: white;
      padding: 14px 16px;
      text-align: left;
      font-size: 13px;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9f9f9; }
    .badge {
      background: #e8f5e9;
      color: #27ae60;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>📊 Ön Sipariş Admin Paneli</h1>
  <span id="last-updated">Yükleniyor...</span>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="number" id="total-count">-</div>
    <div class="label">Toplam Rezervasyon</div>
  </div>
  <div class="stat-card">
    <div class="number" id="total-revenue">-</div>
    <div class="label">Tahmini Gelir (TL)</div>
  </div>
  <div class="stat-card">
    <div class="number" id="unique-customers">-</div>
    <div class="label">Benzersiz Müşteri</div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-dark" onclick="loadData()">🔄 Yenile</button>
  <button class="btn btn-green" onclick="exportCSV()">📥 CSV İndir</button>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Ürün</th>
        <th>Email</th>
        <th>Adet</th>
        <th>Ön Sipariş Fiyatı</th>
        <th>Tarih</th>
        <th>Durum</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="7" class="loading">⏳ Yükleniyor...</td></tr>
    </tbody>
  </table>
</div>

<script>
const API_URL = 'https://preorder-api.onrender.com'

async function loadData() {
  async function loadProducts() {
  try {
    const res = await fetch(`${API_URL}/api/products`)
    const data = await res.json()

    document.getElementById('products-table').innerHTML = data.map(p => `
      <tr>
        <td>${p.name}</td>
        <td>${p.originalPrice.toFixed(2)} TL</td>
        <td>${p.preorderPrice.toFixed(2)} TL</td>
        <td>${p.maxPreorder}</td>
        <td>${p.totalReservations}</td>
        <td>${p.remainingSlots}</td>
        <td>${p.remainingSlots <= 0 
          ? '<span style="background:#fde8e8;color:#c0392b;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;">❌ Doldu</span>'
          : '<span class="badge">✅ Aktif</span>'
        }</td>
      </tr>
    `).join('')
  } catch(e) {
    document.getElementById('products-table').innerHTML = '<tr><td colspan="7" class="empty">❌ Hata</td></tr>'
  }
}

loadProducts()
setInterval(loadProducts, 30000)
  document.getElementById('table-body').innerHTML = '<tr><td colspan="7" class="loading">⏳ Yükleniyor...</td></tr>'
  
  try {
    const res = await fetch(`${API_URL}/api/reservations`)
    const data = await res.json()

    // İstatistikler
    document.getElementById('total-count').innerText = data.length
    document.getElementById('unique-customers').innerText = new Set(data.map(r => r.email)).size
    const revenue = data.reduce((sum, r) => sum + (r.product.preorderPrice * r.quantity), 0)
    document.getElementById('total-revenue').innerText = revenue.toFixed(2)
    document.getElementById('last-updated').innerText = 'Son güncelleme: ' + new Date().toLocaleTimeString('tr-TR')

    if (data.length === 0) {
      document.getElementById('table-body').innerHTML = '<tr><td colspan="7" class="empty">Henüz rezervasyon yok</td></tr>'
      return
    }

    // Tablo
    document.getElementById('table-body').innerHTML = data.map((r, i) => `
      <tr>
        <td>${r.id}</td>
        <td>${r.product.name}</td>
        <td>${r.email}</td>
        <td>${r.quantity}</td>
        <td>${r.product.preorderPrice.toFixed(2)} TL</td>
        <td>${new Date(r.createdAt).toLocaleString('tr-TR')}</td>
        <td><span class="badge">✅ Aktif</span></td>
      </tr>
    `).join('')

  } catch(e) {
    document.getElementById('table-body').innerHTML = '<tr><td colspan="7" class="empty">❌ API bağlantı hatası</td></tr>'
  }
}

function exportCSV() {
  window.open(`${API_URL}/api/reservations/export`, '_blank')
}

loadData()
setInterval(loadData, 30000) // Her 30 saniyede otomatik yenile
</script>
<h2 style="margin: 30px 0 15px; font-size: 18px;">📦 Ürün Stok Durumu</h2>

<div class="table-wrapper" style="margin-bottom: 30px;">
  <table>
    <thead>
      <tr>
        <th>Ürün</th>
        <th>Normal Fiyat</th>
        <th>Ön Sipariş Fiyatı</th>
        <th>Max Ön Sipariş</th>
        <th>Toplam Rezervasyon</th>
        <th>Kalan Slot</th>
        <th>Durum</th>
      </tr>
    </thead>
    <tbody id="products-table">
      <tr><td colspan="7" class="loading">⏳ Yükleniyor...</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
